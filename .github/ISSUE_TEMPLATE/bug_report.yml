name: Bug report
description: Report something that is broken or behaves incorrectly.
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Before submitting,
        please search existing issues to avoid duplicates.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what went wrong.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Exact commands so a maintainer can reproduce the issue.
      placeholder: |
        1. Run `cksumx ...`
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: cksumx version
      description: Output of `cksumx --version`.
      placeholder: "cksumx 1.0.0"
    validations:
      required: true

  - type: input
    id: openssl
    attributes:
      label: OpenSSL version
      description: Output of `openssl version`.
      placeholder: "OpenSSL 3.0.13"
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: OS / compiler / CMake
      placeholder: "Ubuntu 24.04, g++ 13.3, CMake 3.28"
    validations:
      required: true
