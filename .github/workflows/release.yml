name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: cksumx-linux-x86_64
          - os: macos-latest
            artifact: cksumx-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenSSL (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev

      - name: Install OpenSSL (macOS)
        if: runner.os == 'macOS'
        run: brew install openssl@3

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
                -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3)

      - name: Build
        run: cmake --build build -j --config Release

      - name: Smoke test
        run: ./build/cksumx --version

      - name: Stage binary
        run: |
          mkdir -p stage
          cp build/cksumx stage/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: stage/${{ matrix.artifact }}

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA-256 checksums
        working-directory: artifacts
        run: |
          sha256sum cksumx-* > checksums-sha256.txt
          echo "Checksums:" && cat checksums-sha256.txt

      - name: Publish GitHub release (idempotent)
        working-directory: artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; refreshing assets."
            # Re-point the release at this build and replace any existing assets.
            gh release edit "$TAG" --target "${{ github.sha }}"
            gh release upload "$TAG" cksumx-* checksums-sha256.txt --clobber
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "cksumx $TAG" \
              --target "${{ github.sha }}" \
              cksumx-* checksums-sha256.txt
          fi
